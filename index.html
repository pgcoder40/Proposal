<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find the Hidden Hearts</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap');
:root{--sky-top:#87CEEB;--sky-bottom:#E0F7FA;--grass-top:#A2D149;--grass-bottom:#76B041;--heart-color:#FF6B6B}
*{box-sizing:border-box;margin:0;padding:0}
body,html{width:100%;height:100vh;overflow:hidden;font-family:'Quicksand',sans-serif;user-select:none}
.scene{position:fixed;inset:0;background:linear-gradient(to bottom,var(--sky-top),var(--sky-bottom) 60%,var(--grass-top) 60%,var(--grass-bottom));z-index:0}
.interactive{cursor:pointer;transition:transform .2s,filter .2s}
.interactive:hover{transform:scale(1.05);filter:brightness(1.1)}
.sun{position:absolute;top:50px;right:50px;width:80px;height:80px;background:#FFD700;border-radius:50%;box-shadow:0 0 40px #FFD700,0 0 80px #FFA500;animation:pulse-sun 4s infinite alternate}
.cloud{position:absolute;background:#fff;border-radius:50px;opacity:.9}
.cloud::after,.cloud::before{content:'';position:absolute;background:inherit;border-radius:50%}
.cloud-1{top:80px;left:10%;width:120px;height:40px}
.cloud-1::after{top:-20px;left:15px;width:50px;height:50px}
.cloud-1::before{top:-30px;left:50px;width:60px;height:60px}
.cloud-2{top:150px;left:60%;width:100px;height:35px}
.cloud-2::after{top:-15px;left:10px;width:40px;height:40px}
.cloud-2::before{top:-25px;left:40px;width:50px;height:50px}
.tree{position:absolute;bottom:40%;z-index:1}
.trunk{width:30px;height:100px;background:#8B4513;margin:0 auto;border-radius:5px}
.foliage{width:120px;height:120px;background:#FFC0CB;border-radius:50%;position:absolute;bottom:80px;left:50%;transform:translateX(-50%);box-shadow:20px 20px 0 #FFB6C1,-20px 10px 0 #FF69B4}
.tree-1{left:10%;transform:scale(1.2)}
.tree-2{right:15%;transform:scale(1.1)}
.tree-3{left:40%;transform:scale(0.8);bottom:42%;opacity:.9}
.picnic-blanket{position:absolute;bottom:15%;left:50%;transform:translateX(-50%) rotate(-5deg) skewX(20deg);width:250px;height:180px;background:repeating-linear-gradient(90deg,#fff,#fff 20px,#ffcccc 20px,#ffcccc 40px),repeating-linear-gradient(0deg,#fff,#fff 20px,#ffcccc 20px,#ffcccc 40px);background-blend-mode:multiply;box-shadow:0 10px 20px rgba(0,0,0,.1);z-index:2}
.river{position:absolute;bottom:0;width:100%;height:15%;background:#4FC3F7;z-index:2;overflow:hidden}
.wave{position:absolute;width:200%;height:100%;background:rgba(255,255,255,.3);border-radius:40%;animation:wave 10s infinite linear}
#game-ui{position:fixed;top:20px;left:20px;background:rgba(255,255,255,.9);padding:15px 25px;border-radius:30px;box-shadow:0 4px 15px rgba(0,0,0,.1);font-family:'Pacifico',cursive;color:var(--heart-color);font-size:1.5rem;z-index:100;display:flex;align-items:center;gap:10px}
#game-title{position:fixed;top:20px;left:50%;transform:translateX(-50%);font-family:'Pacifico',cursive;color:var(--heart-color);font-size:2.2rem;text-shadow:2px 2px 4px rgba(255,255,255,.8);z-index:90;pointer-events:none;text-align:center;white-space:nowrap}
.hidden-heart{position:fixed;width:30px;height:30px;background:var(--heart-color);transform:rotate(45deg) scale(0);cursor:pointer;z-index:50;opacity:0;transition:all .5s cubic-bezier(.175,.885,.32,1.275);pointer-events:none}
.hidden-heart::before,.hidden-heart::after{content:'';position:absolute;width:30px;height:30px;background:var(--heart-color);border-radius:50%}
.hidden-heart::before{top:-15px;left:0}
.hidden-heart::after{top:0;left:-15px}
.hidden-heart.revealed{transform:rotate(45deg) scale(1);opacity:1;pointer-events:auto;animation:bounce 1s infinite alternate}
@keyframes bounce{0%{transform:rotate(45deg) scale(1) translateY(0)}100%{transform:rotate(45deg) scale(1.1) translateY(-10px)}}
#h1{top:5%;left:16%}
#h2{bottom:70%;left:10%}
#h3{bottom:25%;left:50%}
#h4{bottom:10%;right:50%}
#h5{top:55%;right:15%}
@keyframes pulse-sun{0%{transform:scale(1)}100%{transform:scale(1.1)}}
@keyframes wave{0%{transform:translateX(0) rotate(0deg)}100%{transform:translateX(-50%) rotate(360deg)}}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
@keyframes riseUp{0%{transform:translateY(0) scale(1) rotate(45deg);opacity:1}100%{transform:translateY(-100px) scale(1.5) rotate(45deg);opacity:0}}
@keyframes fadeInUp{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
.found-anim{animation:riseUp 1s ease-out forwards;pointer-events:none}
.overlay-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:1000;justify-content:center;align-items:center}
.modal-content{background:rgba(255,255,255,.95);padding:40px;border-radius:20px;text-align:center;max-width:500px;width:90%;box-shadow:0 10px 30px rgba(0,0,0,.3);animation:pop .5s cubic-bezier(.175,.885,.32,1.275);border:2px solid #fff}
.modal-content h1{font-family:'Pacifico',cursive;color:#E91E63;margin-bottom:20px;font-size:2.5rem}
.modal-content p{color:#555;font-size:1.2rem;margin-bottom:30px}
.btn-group{display:flex;justify-content:center;gap:20px;position:relative;height:60px}
button{padding:12px 35px;font-size:1.2rem;border:none;border-radius:50px;cursor:pointer;font-family:'Quicksand',sans-serif;font-weight:600;transition:transform .2s}
.btn-yes{background:#E91E63;color:#fff;box-shadow:0 4px 15px rgba(233,30,99,.3)}
.btn-yes:hover{transform:scale(1.1);background:#D81B60}
.btn-no{background:#ddd;color:#555;position:absolute;left:60%;transition:transform .3s ease}
#celebration{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);justify-content:center;align-items:center;flex-direction:column;text-align:center;color:#fff;text-shadow:0 4px 10px rgba(0,0,0,.5);z-index:2000}
#celebration h1{font-size:5rem;color:#fff;margin:0;animation:pop .8s;font-family:'Pacifico',cursive}
#celebration p{color:#fff;font-size:1.6rem;font-weight:bold;margin-top:16px}
#music-bar{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.95);border-radius:50px;padding:12px 28px;font-size:1rem;font-family:'Quicksand',sans-serif;color:#E91E63;font-weight:700;z-index:2100;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:fadeInUp .5s;align-items:center;gap:10px}
#music-bar .dot{width:10px;height:10px;background:#E91E63;border-radius:50%;animation:pulse-sun .6s infinite alternate;display:inline-block}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:1500;display:none}
</style>
</head>
<body>

<div class="scene">
  <div class="sun"></div>
  <div class="cloud cloud-1 interactive" onclick="revealHeart('h1')"></div>
  <div class="cloud cloud-2"></div>
  <div class="tree tree-1 interactive" onclick="revealHeart('h2')"><div class="foliage"></div><div class="trunk"></div></div>
  <div class="tree tree-3"><div class="foliage"></div><div class="trunk"></div></div>
  <div class="picnic-blanket interactive" onclick="revealHeart('h3')"></div>
  <div class="tree tree-2 interactive" onclick="revealHeart('h5')"><div class="foliage"></div><div class="trunk"></div></div>
  <div class="river interactive" onclick="revealHeart('h4')">
    <div class="wave" style="bottom:-20px;left:0"></div>
    <div class="wave" style="bottom:-30px;left:-20px;opacity:.5"></div>
  </div>
</div>

<div id="game-title">Find the hidden hearts 💕</div>
<div id="game-ui"><span>❤️</span><span id="score">0 / 5</span></div>

<div class="hidden-heart" id="h1" onclick="collectHeart(this)"></div>
<div class="hidden-heart" id="h2" onclick="collectHeart(this)"></div>
<div class="hidden-heart" id="h3" onclick="collectHeart(this)"></div>
<div class="hidden-heart" id="h4" onclick="collectHeart(this)"></div>
<div class="hidden-heart" id="h5" onclick="collectHeart(this)"></div>

<div class="overlay-wrap" id="proposal-modal">
  <div class="modal-content">
    <h1>You found my heart!</h1>
    <p>Now I have a question di Azhumoonji...<br>Will you marry me?</p>
    <div class="btn-group">
      <button class="btn-yes" onclick="acceptProposal()">YES! ❤️</button>
      <button class="btn-no" id="btn-no" onmouseover="dodgeButton()">No</button>
    </div>
  </div>
</div>

<div id="celebration">
  <h1>Yeah! ❤️</h1>
  <p>Best Valentine's Day Ever!</p>
</div>

<div id="music-bar">
  <span class="dot"></span>
  <span>En Jeevan &nbsp;·&nbsp; Theri &nbsp;·&nbsp; A.R. Rahman</span>
</div>

<!-- Audio element — file must be in the same folder as this HTML -->
<audio id="bg-music" loop>
  <source src="Unnale-Ennalum-En-Jeevan.mp3" type="audio/mpeg">
  <source src="Unnale-Ennalum-En-Jeevan.ogg" type="audio/ogg">
</audio>

<canvas id="confetti"></canvas>

<script>
/* ═══════════════════════════════
   GAME LOGIC
═══════════════════════════════ */
let heartsFound = 0;
const total = 5;
const scoreEl = document.getElementById('score');
const modal   = document.getElementById('proposal-modal');
const noBtn   = document.getElementById('btn-no');
const found   = new Set();

function revealHeart(id) {
  const h = document.getElementById(id);
  if (h && !found.has(id)) {
    found.add(id);
    h.classList.add('revealed');
    heartsFound++;
    scoreEl.textContent = heartsFound + ' / ' + total;
    if (heartsFound === total)
      setTimeout(() => { modal.style.display = 'flex'; }, 1500);
  }
}

function collectHeart(el) {
  if (el.style.pointerEvents === 'none') return;
  el.style.pointerEvents = 'none';
  el.classList.remove('revealed');
  el.classList.add('found-anim');
}

function dodgeButton() {
  const x = Math.random() * 400 - 200;
  const y = Math.random() * 200 - 100;
  noBtn.style.transform = 'translate(' + x + 'px,' + y + 'px)';
}

function acceptProposal() {
  modal.style.display = 'none';
  document.getElementById('game-ui').style.display = 'none';
  document.getElementById('celebration').style.display = 'flex';
  document.getElementById('confetti').style.display = 'block';
  const mb = document.getElementById('music-bar');
  mb.style.display = 'flex';
  startConfetti();
  playEnJeevan();
}

/* ═══════════════════════════════
   MUSIC — plays your local file
═══════════════════════════════ */
function playEnJeevan() {
  const audio = document.getElementById('bg-music');
  audio.volume = 0.85;
  audio.play().catch(function(e) {
    console.warn('Audio playback failed:', e);
  });
}

/* ═══════════════════════════════
   CONFETTI
═══════════════════════════════ */
const canvas = document.getElementById('confetti');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
const pieces = [];
const cols   = ['#FF6B6B','#FFD700','#FF69B4','#7EC8E3','#A8E6CF','#FFB347','#C9B1FF','#ffffff'];

function startConfetti() {
  for (let i = 0; i < 350; i++) {
    pieces.push({
      x:     Math.random() * canvas.width,
      y:     Math.random() * canvas.height - canvas.height,
      w:     Math.random() * 10 + 5,
      h:     Math.random() * 10 + 5,
      color: cols[Math.floor(Math.random() * cols.length)],
      speed: Math.random() * 5 + 2,
      angle: Math.random() * 6.28,
      rot:   Math.random() * 360
    });
  }
  animateConfetti();
}

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  pieces.forEach(p => {
    p.y += p.speed;
    p.x += Math.sin(p.angle) * 2;
    p.angle += 0.05;
    p.rot   += 3;
    if (p.y > canvas.height) p.y = -20;
    ctx.save();
    ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
    ctx.rotate(p.rot * Math.PI / 180);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  });
  requestAnimationFrame(animateConfetti);
}

window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
